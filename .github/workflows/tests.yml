name: Tests ParaBank CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ══════════════════════════════════════════
  #  JOB 1 : TESTS LOGIN
  # ══════════════════════════════════════════
  tests-login:
    name: 🔐 Tests Login
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install behave selenium webdriver-manager

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Lancer les tests Login
        run: python -m behave features/login.feature --format json --outfile rapport_login.json --no-capture
        env:
          CI: true

      - name: Sauvegarder rapport Login
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-login
          path: |
            rapport_login.json
            screenshots/

  # ══════════════════════════════════════════
  #  JOB 2 : TESTS TRANSFERT
  # ══════════════════════════════════════════
  tests-transfert:
    name: 💸 Tests Transfert
    runs-on: ubuntu-latest
    needs: tests-login

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install behave selenium webdriver-manager

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Lancer les tests Transfert
        run: python -m behave features/transfer.feature --format json --outfile rapport_transfer.json --no-capture
        env:
          CI: true

      - name: Sauvegarder rapport Transfert
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-transfert
          path: |
            rapport_transfer.json
            screenshots/

  # ══════════════════════════════════════════
  #  JOB 3 : RAPPORT FINAL
  # ══════════════════════════════════════════
  rapport-final:
    name: 📊 Rapport Final
    runs-on: ubuntu-latest
    needs: [ tests-login, tests-transfert ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Télécharger rapport Login
        uses: actions/download-artifact@v4
        with:
          name: rapport-login

      - name: Télécharger rapport Transfert
        uses: actions/download-artifact@v4
        with:
          name: rapport-transfert

      - name: Générer rapport HTML final
        run: python generer_rapport.py

      - name: Sauvegarder rapport HTML
        uses: actions/upload-artifact@v4
        with:
          name: rapport-html-final
          path: rapport.html